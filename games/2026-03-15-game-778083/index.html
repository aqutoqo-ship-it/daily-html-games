<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soundscape Guardian</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5510873226977158" crossorigin="anonymous"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #282c34; color: white; font-family: Arial, sans-serif; }
        canvas { border: 1px solid #fff; }
        #score { font-size: 24px; margin: 20px; }
        #startButton { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        .adsbygoogle { margin: 20px 0; }
    </style>
</head>
<body>
    <ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-5510873226977158" data-ad-slot="7052338247" data-ad-format="horizontal" data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

    <h1>Soundscape Guardian</h1>
    <div id="score">Score: 0</div>
    <button id="startButton">Start Game</button>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const startButton = document.getElementById('startButton');

        let score = 0;
        let gameActive = false;
        const waves = [];
        const waveCount = 5;

        class Wave {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = Math.random() * 20 + 10;
                this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                this.active = true;
            }
            draw() {
                if (this.active) {
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function initWaves() {
            waves.length = 0;
            for (let i = 0; i < waveCount; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                waves.push(new Wave(x, y));
            }
        }

        function startGame() {
            score = 0;
            gameActive = true;
            initWaves();
            scoreDisplay.textContent = `Score: ${score}`;
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            waves.forEach(wave => wave.draw());
            score += 1;
            scoreDisplay.textContent = `Score: ${score}`;
            requestAnimationFrame(gameLoop);
        }

        canvas.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            waves.forEach(wave => {
                const dx = x - wave.x;
                const dy = y - wave.y;
                if (Math.sqrt(dx * dx + dy * dy) < wave.radius) {
                    wave.active = false;
                    score += 10;
                }
            });
        });

        startButton.addEventListener('click', startGame);
    </script>

</body>
</html>
