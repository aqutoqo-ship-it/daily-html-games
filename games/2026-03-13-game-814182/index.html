<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rhythm Drift</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: black;
            color: white;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            display: block;
            margin: auto;
            background: radial-gradient(circle, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 100%);
        }
        #startButton {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px;
            font-size: 24px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 10px;
            transition: background 0.3s;
        }
        #startButton:hover {
            background: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <button id="startButton">Start Game</button>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');

        let gameRunning = false;
        let score = 0;
        let speed = 5;
        let hovercraft = { x: canvas.width / 2, y: canvas.height - 70, width: 50, height: 30 };
        let obstacles = [];
        let music = new Audio('https://www.soundjay.com/button/sounds/button-16.mp3'); // Placeholder audio

        function startGame() {
            score = 0;
            speed = 5;
            hovercraft.x = canvas.width / 2;
            hovercraft.y = canvas.height - 70;
            obstacles = [];
            gameRunning = true;
            startButton.style.display = 'none';
            music.play();
            requestAnimationFrame(gameLoop);
        }

        function gameLoop() {
            if (!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawHovercraft();
            updateObstacles();
            drawObstacles();
            checkCollisions();
            score++;
            ctx.fillStyle = 'white';
            ctx.font = '24px Arial';
            ctx.fillText('Score: ' + score, 10, 30);
            if (score % 100 === 0) speed += 0.5; // Increase speed every 100 points
            requestAnimationFrame(gameLoop);
        }

        function drawHovercraft() {
            ctx.fillStyle = 'cyan';
            ctx.fillRect(hovercraft.x, hovercraft.y, hovercraft.width, hovercraft.height);
        }

        function updateObstacles() {
            if (Math.random() < 0.02) {
                obstacles.push({ x: Math.random() * (canvas.width - 50), y: -30, width: 50, height: 30 });
            }
            obstacles.forEach(obstacle => obstacle.y += speed);
            obstacles = obstacles.filter(obstacle => obstacle.y < canvas.height);
        }

        function drawObstacles() {
            ctx.fillStyle = 'red';
            obstacles.forEach(obstacle => ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height));
        }

        function checkCollisions() {
            for (let obstacle of obstacles) {
                if (hovercraft.x < obstacle.x + obstacle.width &&
                    hovercraft.x + hovercraft.width > obstacle.x &&
                    hovercraft.y < obstacle.y + obstacle.height &&
                    hovercraft.y + hovercraft.height > obstacle.y) {
                    
                    endGame();
                }
            }
        }

        function endGame() {
            gameRunning = false;
            music.pause();
            startButton.style.display = 'block';
            alert('Game Over! Your score: ' + score);
        }

        document.addEventListener('keydown', (event) => {
            if (event.code === 'ArrowLeft' && hovercraft.x > 0) {
                hovercraft.x -= 20;
            }
            if (event.code === 'ArrowRight' && hovercraft.x < canvas.width - hovercraft.width) {
                hovercraft.x += 20;
            }
        });

        startButton.addEventListener('click', startGame);
    </script>
</body>
</html>
