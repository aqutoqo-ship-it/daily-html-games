<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Master</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        #game {
            display: none;
            position: relative;
            width: 300px;
            height: 400px;
            border: 2px solid #ccc;
            background-color: #fff;
            overflow: hidden;
        }
        .falling-word {
            position: absolute;
            width: 100%;
            text-align: center;
            font-size: 20px;
            opacity: 1;
            transition: transform 1s, opacity 1s;
        }
        #score {
            margin-bottom: 10px;
        }
        #start {
            padding: 10px 20px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="start">Start</div>
    <div id="game">
        <div id="score">Score: 0</div>
    </div>
    <script>
        const words = ["apple", "banana", "grape", "orange", "pear", "peach", "melon"];
        let score = 0;
        let gameInterval;
        const gameDiv = document.getElementById('game');
        const scoreDiv = document.getElementById('score');
        const startButton = document.getElementById('start');

        startButton.onclick = () => {
            score = 0;
            scoreDiv.innerText = "Score: " + score;
            gameDiv.style.display = 'block';
            startButton.style.display = 'none';
            startGame();
        };

        function startGame() {
            gameInterval = setInterval(() => {
                const word = words[Math.floor(Math.random() * words.length)];
                const wordDiv = document.createElement('div');
                wordDiv.className = 'falling-word';
                wordDiv.innerText = word;
                wordDiv.style.top = '0px';
                gameDiv.appendChild(wordDiv);
                dropWord(wordDiv);
            }, 2000);
        }

        function dropWord(wordDiv) {
            let position = 0;
            const dropInterval = setInterval(() => {
                position += 4;
                wordDiv.style.top = position + 'px';
                if (position > 400) {
                    clearInterval(dropInterval);
                    gameDiv.removeChild(wordDiv);
                }
            }, 50);

            wordDiv.onclick = () => {
                clearInterval(dropInterval);
                gameDiv.removeChild(wordDiv);
                score++;
                scoreDiv.innerText = "Score: " + score;
            };
        }
    </script>
</body>
</html>
