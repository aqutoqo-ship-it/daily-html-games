<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Pulse</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #1e1e1e;
            font-family: 'Arial', sans-serif;
            color: #ffffff;
        }

        h1 {
            text-align: center;
            margin-top: 20px;
        }

        canvas {
            display: block;
            margin: 0 auto;
            background: radial-gradient(circle, #282828, #1e1e1e);
        }

        #startBtn {
            display: block;
            margin: 20px auto;
            padding: 10px 20px;
            font-size: 20px;
            background-color: #3b3b3b;
            color: #ffffff;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #startBtn:hover {
            background-color: #4d4d4d;
        }

        #score {
            text-align: center;
            font-size: 24px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Echo Pulse</h1>
    <button id="startBtn">Start Game</button>
    <div id="score">Score: 0</div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('startBtn');
        const scoreDisplay = document.getElementById('score');

        let score = 0;
        let gameActive = false;
        let beats = [];
        let currentBeatIndex = 0;

        startBtn.addEventListener('click', () => {
            startGame();
        });

        function startGame() {
            score = 0;
            gameActive = true;
            currentBeatIndex = 0;
            beats = generateBeats(10);
            scoreDisplay.textContent = 'Score: ' + score;
            animate();
        }

        function generateBeats(num) {
            let beatsArray = [];
            for (let i = 0; i < num; i++) {
                beatsArray.push(Math.random() * canvas.width);
            }
            return beatsArray;
        }

        function animate() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBeats();
            requestAnimationFrame(animate);
        }

        function drawBeats() {
            ctx.fillStyle = '#ff007f';
            for (let i = 0; i < beats.length; i++) {
                ctx.fillRect(beats[i], canvas.height / 2, 50, Math.sin(Date.now() / 500 + i) * 20 + 20);
                if (currentBeatIndex === i) {
                    ctx.fillStyle = '#00ff7f';
                }
            }
            ctx.fillStyle = '#ff007f';
        }

        window.addEventListener('keydown', (e) => {
            if (!gameActive) return;

            if (e.key === ' ') {
                if (currentBeatIndex < beats.length) {
                    score++;
                    currentBeatIndex++;
                    scoreDisplay.textContent = 'Score: ' + score;
                }
                if (currentBeatIndex >= beats.length) {
                    gameActive = false;
                    alert('Game Over! Your score is: ' + score);
                }
            }
        });
    </script>
</body>
</html>
