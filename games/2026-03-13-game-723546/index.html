<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luminara Maze</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: black;
            color: white;
            font-family: 'Arial', sans-serif;
        }
        canvas {
            border: 2px solid #fff;
            background: #1a1a1a;
        }
        #startButton {
            padding: 10px 20px;
            font-size: 20px;
            cursor: pointer;
            border: none;
            background: #0a3d62;
            color: white;
            border-radius: 5px;
            transition: background 0.3s;
        }
        #startButton:hover {
            background: #1e90ff;
        }
        #score {
            font-size: 24px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>Luminara Maze</h1>
    <canvas id="gameCanvas" width="600" height="400"></canvas>
    <button id="startButton">Start Game</button>
    <div id="score">Score: 0</div>
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const startButton = document.getElementById('startButton');
        const scoreDisplay = document.getElementById('score');

        let score = 0;
        let gameOver = false;
        let beams = [];
        let player = { x: 50, y: 50, size: 10 };

        const mazes = [
            [ // Maze layout
                "##########",
                "#        #",
                "# ### ## #",
                "# #   #  #",
                "# ### # ##",
                "#       ##",
                "### ###  #",
                "#        #",
                "##########"
            ]
        ];

        function drawMaze(maze) {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            for (let y = 0; y < maze.length; y++) {
                for (let x = 0; x < maze[y].length; x++) {
                    if (maze[y][x] === '#') {
                        ctx.fillStyle = '#333';
                        ctx.fillRect(x * 60, y * 40, 60, 40);
                    }
                }
            }
        }

        function drawPlayer() {
            ctx.fillStyle = '#0ff';
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawBeams() {
            beams.forEach(beam => {
                ctx.fillStyle = '#ff0';
                ctx.fillRect(beam.x, beam.y, beam.width, beam.height);
            });
        }

        function update() {
            if (gameOver) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawMaze(mazes[0]);
            drawPlayer();
            drawBeams();
        }

        function startGame() {
            score = 0;
            beams = [];
            player = { x: 50, y: 50, size: 10 };
            gameOver = false;
            scoreDisplay.innerHTML = `Score: ${score}`;
            setInterval(update, 100);
            generateBeams();
        }

        function generateBeams() {
            for (let i = 0; i < 3; i++) {
                beams.push({ x: Math.random() * (canvas.width - 20), y: Math.random() * (canvas.height - 20), width: 20, height: 5 });
            }
        }

        function gameOverCheck() {
            if (player.x < 0 || player.x > canvas.width || player.y < 0 || player.y > canvas.height) {
                gameOver = true;
                alert('Game Over! Your score: ' + score);
            }
        }

        window.addEventListener('keydown', (e) => {
            if (gameOver) return;
            switch (e.key) {
                case 'ArrowUp': player.y -= 10; break;
                case 'ArrowDown': player.y += 10; break;
                case 'ArrowLeft': player.x -= 10; break;
                case 'ArrowRight': player.x += 10; break;
            }
            gameOverCheck();
        });

        startButton.addEventListener('click', startGame);
    </script>
</body>
</html>
